apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: mub-monitor
  namespace: <NAMESPACE>
  labels:
    team: mub
    release: prometheus
spec:
  selector:
    matchLabels:
      prometheus.io/scrape: 'true'
  podTargetLabels:
  - application_name
  podMetricsEndpoints:
  - port: "http-mubpodport"

